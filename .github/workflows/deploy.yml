name: Deploy to GitHub Pages 🚀

on:
push:
branches: [main]

jobs:
build:
runs-on: ubuntu-latest

steps:
  - name: Checkout 🛎️
    uses: actions/checkout@v4
    with:
      submodules: true
      fetch-depth: 0

  - name: Setup Hugo ⚙️
    uses: peaceiris/actions-hugo@v3
    with:
      hugo-version: 'latest'
      extended: true

  - name: Build 🔧
    run: hugo --minify

  - name: Deploy 🚀
    uses: JamesIves/github-pages-deploy-action@v4
    with:
      token: ${{ secrets.PERSONAL_TOKEN }}
      repository-name: lbmcu/lbmcu.github.io
      branch: main
      folder: public
      clean: true
